
services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-boot-testbbl-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: testbbl_db
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d testbbl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

